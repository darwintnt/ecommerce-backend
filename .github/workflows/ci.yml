name: CI - Continuous Integration

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9"

jobs:
  setup:
    name: Setup and Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        working-directory: ./ecommerce-backend
        run: pnpm install --frozen-lockfile

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: ecommerce-backend/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/pnpm-lock.yaml') }}

  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache@v5
        with:
          path: ecommerce-backend/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Generate Prisma Clients
        working-directory: ./ecommerce-backend
        run: |
          pnpm prisma generate --schema=./apps/products-service/prisma/schema.prisma
          pnpm prisma generate --schema=./apps/orders-service/prisma/schema.prisma

      - name: Run ESLint
        working-directory: ./ecommerce-backend
        run: pnpm run lint

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache@v5
        with:
          path: ecommerce-backend/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Generate Prisma Clients
        working-directory: ./ecommerce-backend
        run: |
          pnpm prisma generate --schema=./apps/products-service/prisma/schema.prisma
          pnpm prisma generate --schema=./apps/orders-service/prisma/schema.prisma

      - name: Run tests
        working-directory: ./ecommerce-backend
        run: pnpm run test

      - name: Generate coverage report
        working-directory: ./ecommerce-backend
        run: pnpm run test:cov
        continue-on-error: true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ecommerce-backend/coverage
          retention-days: 7

  build-products:
    name: Build Products Service
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache@v5
        with:
          path: ecommerce-backend/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Generate Prisma Clients
        working-directory: ./ecommerce-backend
        run: |
          pnpm prisma generate --schema=./apps/products-service/prisma/schema.prisma
          pnpm prisma generate --schema=./apps/orders-service/prisma/schema.prisma

      - name: Build Products Service
        working-directory: ./ecommerce-backend
        run: pnpm run build products-service

      - name: Verify build output
        working-directory: ./ecommerce-backend
        run: |
          if [ ! -f "dist/apps/products-service/main.js" ]; then
            echo "Error: products-service build failed - main.js not found"
            exit 1
          fi
          echo "✅ Products Service build successful"
          ls -lah dist/apps/products-service/

      - name: Upload Products Service artifact
        uses: actions/upload-artifact@v4
        with:
          name: products-service-dist
          path: ecommerce-backend/dist/apps/products-service
          retention-days: 7

  build-orders:
    name: Build Orders Service
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Restore node_modules cache
        uses: actions/cache@v5
        with:
          path: ecommerce-backend/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Generate Prisma Clients
        working-directory: ./ecommerce-backend
        run: |
          pnpm prisma generate --schema=./apps/products-service/prisma/schema.prisma
          pnpm prisma generate --schema=./apps/orders-service/prisma/schema.prisma

      - name: Build Orders Service
        working-directory: ./ecommerce-backend
        run: pnpm run build orders-service

      - name: Verify build output
        working-directory: ./ecommerce-backend
        run: |
          if [ ! -f "dist/apps/orders-service/main.js" ]; then
            echo "Error: orders-service build failed - main.js not found"
            exit 1
          fi
          echo "✅ Orders Service build successful"
          ls -lah dist/apps/orders-service/

      - name: Upload Orders Service artifact
        uses: actions/upload-artifact@v4
        with:
          name: orders-service-dist
          path: ecommerce-backend/dist/apps/orders-service
          retention-days: 7

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, test, build-products, build-orders]
    if: always()
    steps:
      - name: Check CI Status
        run: |
          echo "## CI Workflow Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Lint: ${{ needs.lint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Test: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build Products: ${{ needs.build-products.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build Orders: ${{ needs.build-orders.result }}" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.lint.result }}" == "success" ] && \
             [ "${{ needs.test.result }}" == "success" ] && \
             [ "${{ needs.build-products.result }}" == "success" ] && \
             [ "${{ needs.build-orders.result }}" == "success" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ All CI checks passed!" >> $GITHUB_STEP_SUMMARY
            exit 0
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ Some CI checks failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
