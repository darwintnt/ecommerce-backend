name: CD - Continuous Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip-deploy:
        description: "Skip deployment simulation"
        required: false
        default: "false"

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9"
  REGISTRY: ghcr.io

jobs:
  version:
    name: Version and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # To push tags and commits
      issues: write # To create issues on failure
      pull-requests: write # To comment on PRs
    outputs:
      new-release-published: ${{ steps.semantic.outputs.new-release-published }}
      new-release-version: ${{ steps.semantic.outputs.new-release-version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        working-directory: ./ecommerce-backend
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Clients
        working-directory: ./ecommerce-backend
        run: |
          pnpm prisma generate --schema=./apps/products-service/prisma/schema.prisma
          pnpm prisma generate --schema=./apps/orders-service/prisma/schema.prisma

      - name: Run Semantic Release
        id: semantic
        working-directory: ./ecommerce-backend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          pnpm run release

          # Get the new version from package.json
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new-release-version=$NEW_VERSION" >> $GITHUB_OUTPUT

          # Check if a new release was created
          if [ "$NEW_VERSION" != "0.0.1" ]; then
            echo "new-release-published=true" >> $GITHUB_OUTPUT
            echo "✅ New version released: $NEW_VERSION"
          else
            echo "new-release-published=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No new release (no relevant commits)"
          fi

      - name: Release Summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- New Release: ${{ steps.semantic.outputs.new-release-published }}" >> $GITHUB_STEP_SUMMARY
          echo "- Version: ${{ steps.semantic.outputs.new-release-version }}" >> $GITHUB_STEP_SUMMARY

  build-docker-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: version
    if: needs.version.outputs.new-release-published == 'true'
    permissions:
      contents: read
      packages: write # To push Docker images to GHCR
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Products Service
        id: meta-products
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/products-service
          tags: |
            type=semver,pattern={{version}},value=${{ needs.version.outputs.new-release-version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.version.outputs.new-release-version }}
            type=raw,value=latest

      - name: Build and push Products Service
        uses: docker/build-push-action@v5
        with:
          context: ./ecommerce-backend
          file: ./ecommerce-backend/Dockerfile
          build-args: |
            APP_NAME=products-service
          push: true
          tags: ${{ steps.meta-products.outputs.tags }}
          labels: ${{ steps.meta-products.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for Orders Service
        id: meta-orders
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/orders-service
          tags: |
            type=semver,pattern={{version}},value=${{ needs.version.outputs.new-release-version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.version.outputs.new-release-version }}
            type=raw,value=latest

      - name: Build and push Orders Service
        uses: docker/build-push-action@v5
        with:
          context: ./ecommerce-backend
          file: ./ecommerce-backend/Dockerfile
          build-args: |
            APP_NAME=orders-service
          push: true
          tags: ${{ steps.meta-orders.outputs.tags }}
          labels: ${{ steps.meta-orders.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker Images Summary
        run: |
          echo "## Docker Images Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Products Service" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta-products.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Orders Service" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta-orders.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  deploy-simulation:
    name: Deploy Simulation
    runs-on: ubuntu-latest
    needs: [version, build-docker-images]
    if: |
      needs.version.outputs.new-release-published == 'true' &&
      github.event.inputs.skip-deploy != 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cat > .env << EOF
          POSTGRES_USER=admin
          POSTGRES_PASSWORD=ecommerce_pass
          PRODUCTS_DB=products_db
          ORDERS_DB=orders_db
          LOCALSTACK_AUTH_TOKEN=ls-hanIGoHu-GEVA-8731-Tugo-JopI07998604
          VERSION=${{ needs.version.outputs.new-release-version }}
          EOF

      - name: Start services with Docker Compose
        run: |
          docker-compose up -d
          echo "⏳ Waiting for services to be healthy..."

      - name: Wait for services health
        run: |
          timeout 120 bash -c '
            until docker ps | grep -q "healthy.*localstack_ecommerce"; do
              echo "Waiting for LocalStack..."
              sleep 5
            done
            
            until docker ps | grep -q "healthy.*postgres_ecommerce"; do
              echo "Waiting for PostgreSQL..."
              sleep 5
            done
            
            echo "✅ Infrastructure services are healthy"
          '

          # Wait additional time for app services to start
          echo "⏳ Waiting for application services..."
          sleep 30

      - name: Check services status
        run: |
          echo "## Service Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          docker-compose ps >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Run smoke tests
        id: smoke-tests
        run: |
          echo "## Smoke Tests Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Test Products Service
          echo "### Products Service (Port 3001)" >> $GITHUB_STEP_SUMMARY
          if curl -f -s http://localhost:3001/products?page=1&limit=1 > /dev/null; then
            echo "✅ Products Service - OK" >> $GITHUB_STEP_SUMMARY
            echo "products_service=success" >> $GITHUB_OUTPUT
          else
            echo "❌ Products Service - FAILED" >> $GITHUB_STEP_SUMMARY
            echo "products_service=failed" >> $GITHUB_OUTPUT
          fi

          # Test Orders Service
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Orders Service (Port 3002)" >> $GITHUB_STEP_SUMMARY
          if curl -f -s http://localhost:3002/orders?page=1&limit=1 > /dev/null; then
            echo "✅ Orders Service - OK" >> $GITHUB_STEP_SUMMARY
            echo "orders_service=success" >> $GITHUB_OUTPUT
          else
            echo "❌ Orders Service - FAILED" >> $GITHUB_STEP_SUMMARY
            echo "orders_service=failed" >> $GITHUB_OUTPUT
          fi

      - name: Show service logs on failure
        if: failure()
        run: |
          echo "## Service Logs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Products Service Logs" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          docker logs products_service --tail 50 >> $GITHUB_STEP_SUMMARY 2>&1
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Orders Service Logs" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          docker logs orders_service --tail 50 >> $GITHUB_STEP_SUMMARY 2>&1
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Cleanup
        if: always()
        run: |
          docker-compose down -v
          docker system prune -f

      - name: Verify smoke tests
        if: |
          steps.smoke-tests.outputs.products_service != 'success' ||
          steps.smoke-tests.outputs.orders_service != 'success'
        run: |
          echo "❌ Smoke tests failed"
          exit 1

  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [version, build-docker-images, deploy-simulation]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Version: **${{ needs.version.outputs.new-release-version }}**" >> $GITHUB_STEP_SUMMARY
          echo "- Release Published: ${{ needs.version.outputs.new-release-published }}" >> $GITHUB_STEP_SUMMARY
          echo "- Docker Build: ${{ needs.build-docker-images.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Deploy Simulation: ${{ needs.deploy-simulation.result }}" >> $GITHUB_STEP_SUMMARY
